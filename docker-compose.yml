services:
  app:
    build: .
    container_name: proxmoxdeploy_app
    restart: unless-stopped
    # No ports exposed directly — Nginx is the only entry point
    volumes:
      # Persistent SQLite database + auto-generated SSH key
      - proxmoxdeploy_data:/var/www/html/data
    environment:
      # Proxmox API
      PROXMOX_HOST: ${PROXMOX_HOST}
      PROXMOX_FALLBACK_HOSTS: ${PROXMOX_FALLBACK_HOSTS:-}
      PROXMOX_PORT: ${PROXMOX_PORT:-8006}
      PROXMOX_VERIFY_SSL: ${PROXMOX_VERIFY_SSL:-false}
      PROXMOX_TOKEN_ID: "${PROXMOX_TOKEN_ID}"
      PROXMOX_TOKEN_SECRET: "${PROXMOX_TOKEN_SECRET}"

      # App
      APP_SECRET: ${APP_SECRET}

      # SSH — key is auto-generated in /var/www/html/data/.ssh/id_ed25519
      SSH_PORT: ${SSH_PORT:-22}
      SSH_USER: ${SSH_USER:-root}
      SSH_KEY_PATH: /var/www/html/data/.ssh/id_ed25519
      SSH_PASSWORD: ${SSH_PASSWORD:-}

      # EntraID / Azure AD (optional)
      ENTRAID_TENANT_ID: ${ENTRAID_TENANT_ID:-}
      ENTRAID_CLIENT_ID: ${ENTRAID_CLIENT_ID:-}
      ENTRAID_CLIENT_SECRET: ${ENTRAID_CLIENT_SECRET:-}
      ENTRAID_REDIRECT_URI: ${ENTRAID_REDIRECT_URI:-}
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: proxmoxdeploy_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates: self-signed (gen-cert.sh), own cert, or Let's Encrypt (see below)
      - ${SSL_CERT_PATH:-./docker/nginx/certs}:/etc/nginx/certs:ro
      # Shared webroot for Let's Encrypt ACME HTTP-01 challenge
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal

  # Let's Encrypt certificate management (Certbot)
  # Usage: docker compose run --rm certbot
  # Renewal: docker compose run --rm certbot renew
  certbot:
    image: certbot/certbot:latest
    container_name: proxmoxdeploy_certbot
    volumes:
      # Stores issued certificates persistently
      - letsencrypt:/etc/letsencrypt
      # Shared with Nginx for the ACME HTTP-01 challenge
      - certbot_webroot:/var/www/certbot
      # Script that copies certs into the nginx certs folder after issuance
      - ./docker:/docker:ro
    entrypoint: >
      certbot certonly
        --webroot -w /var/www/certbot
        -d ${DOMAIN}
        --email ${LETSENCRYPT_EMAIL}
        --agree-tos
        --non-interactive
        --keep-until-expiring
    profiles:
      - letsencrypt

networks:
  internal:

volumes:
  proxmoxdeploy_data:
  letsencrypt:
  certbot_webroot:
